name: library-system

services:
  postgres:
    image: postgres:15
    container_name: library_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: LibraryDb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: library_pgadmin
    restart: unless-stopped
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres
    networks:
      - library_network

  api:
    build:
      context: ../backend/LibraryManagementSystem
      dockerfile: src/Api/LibraryManagementSystem.Api/Dockerfile
    container_name: library_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Jwt__Key: ${JWT_KEY}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Cors__AllowedOrigin: ${CORS_ALLOWED_ORIGIN}
      KeyVault__Uri: ${KEYVAULT_URI}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - library_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: library_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  mailhog:
    image: mailhog/mailhog
    container_name: library_mailhog
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - library_network

  mailservice:
    build:
      context: ../backend/LibraryManagementSystem
      dockerfile: src/Mail.Service/LibraryManagementSystem.MailService/Dockerfile
    container_name: library_mailservice
    restart: unless-stopped
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS}
      Smtp__FromName: Library Management System
      KeyVault__Uri: ${KEYVAULT_URI}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
    depends_on:
      - rabbitmq
    networks:
      - library_network

  frontend:
    build:
      context: ../frontend/library-management-system
      dockerfile: Dockerfile
    container_name: library_frontend
    restart: unless-stopped
    environment:
      API_HOST: api
      API_PORT: "8080"
    ports:
      - "8081:80"
    depends_on:
      - api
    networks:
      - library_network

volumes:
  postgres_data:

networks:
  library_network:
    driver: bridge