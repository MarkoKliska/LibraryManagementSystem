<div class="view-toggle">
  <button 
    class="toggle-btn" 
    [class.active]="viewMode === 'available'"
    (click)="switchView('available')"
  >
    Available Books
  </button>
  <button 
    class="toggle-btn" 
    [class.active]="viewMode === 'rented'"
    (click)="switchView('rented')"
  >
    My Rented Books
  </button>
</div>
