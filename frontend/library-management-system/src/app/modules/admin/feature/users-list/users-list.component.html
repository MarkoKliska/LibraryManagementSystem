<div class="users-list-card">
  <h2>Users</h2>
  @if (errorMessage) {
    <div class="error">{{ errorMessage }}</div>
  }
  @if (users.length) {
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user) {
          <tr>
            <td>{{ user.firstName }} {{ user.lastName }}</td>
            <td>{{ user.email }}</td>
            <td>
              <button (click)="viewUserDetails(user.id)">View Details</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
    <div class="pagination">
      <button (click)="goToPage(page - 1)" [disabled]="page <= 1">Previous</button>
      <span>Page {{ page }} of {{ totalPages }} ({{ totalCount }} users)</span>
      <button (click)="goToPage(page + 1)" [disabled]="page >= totalPages">Next</button>

      <select [value]="pageSize" (change)="onPageSizeChange(+$any($event.target).value)">
        @for (size of pageSizeOptions; track size) {
          <option [value]="size">{{ size }} / page</option>
        }
      </select>
    </div>
  } @else {
    <p>No users found.</p>
  }
</div>
